services:
  # 1. FlowMind WebSocket & API Backend (Docker)
  - type: web
    name: flowmind-backend
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: flowmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flowmind-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  # 2. FlowMind Next.js Web Frontend (Docker)
  - type: web
    name: flowmind-frontend
    env: docker
    plan: free
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: flowmind-backend
          property: host

# 3. Managed PostgreSQL Database Instance
databases:
  - name: flowmind-db
    plan: free

# 4. Managed Redis Pub/Sub Instance
redis:
  - name: flowmind-redis
    plan: free
