services:
  # 1. PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: flowmind-postgres
    restart: always
    environment:
      POSTGRES_USER: flowmind_user
      POSTGRES_PASSWORD: flowmind_password
      POSTGRES_DB: flowmind_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmind_user -d flowmind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis pub/sub Service
  redis:
    image: redis:7-alpine
    container_name: flowmind-redis
    restart: always
    ports:
      - "6379:6379"

  # 3. FlowMind WebSocket & API Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowmind-backend
    restart: always
    ports:
      - "3001:3001"
    command: sh -c "npx prisma db push && npm start"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://flowmind_user:flowmind_password@postgres:5432/flowmind_db?schema=public
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      JWT_SECRET: ${JWT_SECRET:-flowmind-super-secret-key-change-in-prod}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. FlowMind Next.js Client Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Default value assumes local host access. Override for production
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: flowmind-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pgdata:
