<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FlowMind Clipper</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #09090b;
      --bg-card: #18181b;
      --border-color: #27272a;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --text-darker: #71717a;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --success: #10b981;
      --error: #f43f5e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding: 16px;
      overflow-x: hidden;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-darker);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-b: 1px solid var(--border-color);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #818cf8 0%, #4f46e5 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #ffffff, #d4d4d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .config-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .config-btn:hover {
      background-color: var(--border-color);
      color: var(--text-main);
    }

    /* Collapsible Config Panel */
    #configPanel {
      display: none;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      animation: slideDown 0.25s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 12px;
      position: relative;
    }

    .form-group-row {
      display: grid;
      grid-template-cols: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      background-color: #0c0c0e;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .info-tag {
      font-size: 11px;
      color: var(--text-darker);
      margin-top: 4px;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
      transition: all 0.2s;
    }

    .submit-btn:hover {
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.4);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      background: var(--border-color);
      color: var(--text-darker);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #statusMessage {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
      animation: fadeIn 0.2s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .status-success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .status-error {
      background-color: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: var(--error);
    }

    .status-info {
      background-color: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: var(--accent);
    }

    .section-divider {
      height: 1px;
      background-color: var(--border-color);
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo-icon">FM</div>
      <h1>FlowMind Clipper</h1>
    </div>
    <button class="config-btn" id="toggleConfig" title="Settings">⚙️</button>
  </header>

  <!-- Config Panel -->
  <div id="configPanel">
    <div class="form-group">
      <label for="apiUrl">Backend API URL</label>
      <input type="text" id="apiUrl" value="http://localhost:3001" placeholder="http://localhost:3001">
    </div>
    <div class="form-group">
      <label for="reporterUser">Your Identity (Reporter)</label>
      <select id="reporterUser">
        <option value="">Loading users...</option>
      </select>
    </div>
    <button class="submit-btn" id="saveConfig" style="margin-top: 8px; padding: 6px;">Save Settings</button>
    <button class="submit-btn" id="logoutBtn" style="margin-top: 8px; padding: 6px; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: none;">Log Out</button>
  </div>

  <!-- Login Panel -->
  <div id="loginForm" style="display: none; animation: fadeIn 0.25s ease-out;">
    <div class="form-group">
      <label for="loginEmail">Email Address</label>
      <input type="email" id="loginEmail" placeholder="E.g., name@example.com">
    </div>
    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password">
    </div>
    <button class="submit-btn" id="loginBtn">
      <div class="spinner" id="loginSpinner"></div>
      <span id="loginBtnText">Log In to FlowMind</span>
    </button>
  </div>

  <div id="mainForm" style="display: none;">
    <!-- Board & Column Selectors (Side-by-Side) -->
    <div class="form-group-row">
      <div>
        <label for="boardSelect">Board</label>
        <select id="boardSelect" required>
          <option value="">Loading boards...</option>
        </select>
      </div>
      <div>
        <label for="columnSelect">Column</label>
        <select id="columnSelect" required disabled>
          <option value="">Select Board first</option>
        </select>
      </div>
    </div>

    <!-- Title input -->
    <div class="form-group">
      <label for="cardTitle">Card Title</label>
      <input type="text" id="cardTitle" required placeholder="E.g., Review guidelines">
    </div>

    <!-- Description textarea -->
    <div class="form-group">
      <label for="cardDesc">Description (Clipped Text)</label>
      <textarea id="cardDesc" placeholder="Select text on any webpage to pre-fill, or type here..."></textarea>
    </div>

    <div class="form-group-row">
      <!-- Assignee dropdown -->
      <div>
        <label for="assigneeSelect">Assignee</label>
        <select id="assigneeSelect">
          <option value="">Unassigned</option>
        </select>
      </div>
      <!-- Complexity field -->
      <div>
        <label for="complexitySelect">Complexity (AI Mode)</label>
        <select id="complexitySelect">
          <option value="">Auto-infer (AI)</option>
          <option value="1">1 (Trivial)</option>
          <option value="2">2 (Easy)</option>
          <option value="3">3 (Medium)</option>
          <option value="4">4 (Hard)</option>
          <option value="5">5 (Complex)</option>
        </select>
      </div>
    </div>

    <!-- Source URL reference -->
    <div class="form-group">
      <label>Reference Source URL</label>
      <span class="info-tag" id="sourceUrlDisplay">Fetching current tab...</span>
    </div>

    <div class="section-divider"></div>

    <!-- Submit Button -->
    <button class="submit-btn" id="submitBtn" disabled>
      <div class="spinner" id="btnSpinner"></div>
      <span id="btnText">Create Kanban Card</span>
    </button>
  </div>

  <div id="statusMessage"></div>

  <script src="popup.js"></script>
</body>
</html>
